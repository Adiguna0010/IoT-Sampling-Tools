<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - IoT Sampling Tools</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-5">
            <div class="logo justify-content-center mb-0">
                <img src="logo.png" alt="Vanguard Labs Team Logo" style="width: 210px; height: auto; max-width: 100%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(255,255,255,0.18));">
            </div>
            <h3 class="fw-bold mb-2 text-white" style="font-size: 28px; letter-spacing: 0.5px; margin-top: -10px;">IoT Sampling Tools</h3>
            <p class="text-white-50 small mb-0 fw-semibold" style="letter-spacing: 0.5px; opacity: 0.85; font-size: 13px;">Sistem Monitoring Terpadu</p>
        </div>
        
        <form id="loginForm">
            <div id="errorBox" class="alert alert-danger p-2 text-center" style="display: none; font-size: 13px;"></div>
            
            <!-- LOGIN PANE -->
            <div id="login-pane">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Masukkan username">
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0">Password</label>
                        <a href="#" id="forgotPassword" class="text-decoration-none" style="font-size: 11px; margin-bottom: 8px; text-transform: none; font-weight: normal; letter-spacing: 0px;">Lupa Password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Masukkan password">
                        <button class="btn btn-outline-secondary border-0 px-3 d-flex align-items-center" type="button" id="togglePassword" style="background: transparent; color: #9CA3AF;">
                            <i class="bi bi-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btnLogin" class="btn btn-brin w-100 py-2 fs-5">Masuk <i class="bi bi-box-arrow-in-right ms-2"></i></button>
                
                <div class="text-center mt-3">
                    <a href="#" id="showRegister" class="text-decoration-none small text-muted">Belum punya akun? <b class="text-primary">Daftar di sini</b></a>
                </div>
            </div>

            <!-- REGISTER PANE -->
            <div id="register-pane" style="display: none;">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username Baru</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-plus"></i></span>
                        <input type="text" class="form-control" id="reg-username" placeholder="Buat username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="reg-password" placeholder="Buat password">
                    </div>
                </div>
                <button type="button" id="btnRegister" class="btn btn-success w-100 py-2 fs-5">Mendaftar <i class="bi bi-person-check ms-2"></i></button>
                
                <div class="text-center mt-3">
                    <a href="#" id="showLogin" class="text-decoration-none small text-muted">Sudah punya akun? <b class="text-primary">Masuk di sini</b></a>
                </div>
            </div>
            
            <div class="text-center mt-4 pt-3" style="border-top: 1px solid rgba(255,255,255,0.06);">
                <p class="mb-0 text-white-50" style="font-size: 11px; opacity: 0.65; letter-spacing: 0.5px; font-weight: 500;">By Poltek Nuklir dan Vanguard Labs Team</p>
            </div>
        </form>
    </div>
</div>

<script>
    // Cek apakah sudah login, jika ya, langsung arahkan ke dashboard
    if(sessionStorage.getItem("role")) {
        window.location.href = "dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();
        if(!user || !pass) return;

        const btn = document.getElementById("btnLogin");
        const errBox = document.getElementById("errorBox");

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Loading...`;
        
        try {
            const res = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            
            const json = await res.json();
            
            if (res.ok && json.status === "berhasil") {
                sessionStorage.setItem("role", json.role);
                sessionStorage.setItem("username", json.username.toUpperCase());
                window.location.href = "dashboard.html";
            } else {
                errBox.style.display = "block";
                errBox.className = "alert alert-danger p-2 text-center";
                errBox.innerText = json.pesan || "Login Gagal!";
                btn.disabled = false;
                btn.innerHTML = `Masuk <i class="bi bi-box-arrow-in-right"></i>`;
            }
        } catch (error) {
            errBox.style.display = "block";
            errBox.className = "alert alert-danger p-2 text-center";
            errBox.innerText = "Tidak dapat terhubung ke server database.";
            btn.disabled = false;
            btn.innerHTML = `Masuk <i class="bi bi-box-arrow-in-right"></i>`;
        }
    });

    // Handle Register
    document.getElementById("btnRegister").addEventListener("click", async function() {
        const user = document.getElementById("reg-username").value.trim();
        const pass = document.getElementById("reg-password").value.trim();
        const errBox = document.getElementById("errorBox");
        const btn = this;

        if(!user || !pass) {
            errBox.style.display = "block";
            errBox.className = "alert alert-warning p-2 text-center";
            errBox.innerText = "Harap isi username dan password!";
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Loading...`;

        try {
            const res = await fetch('http://localhost:3000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const json = await res.json();

            errBox.style.display = "block";
            if (json.status === "berhasil") {
                errBox.className = "alert alert-success p-2 text-center";
                errBox.innerText = json.pesan;
                document.getElementById("reg-username").value = "";
                document.getElementById("reg-password").value = "";
            } else {
                errBox.className = "alert alert-danger p-2 text-center";
                errBox.innerText = json.pesan;
            }
        } catch (err) {
            errBox.style.display = "block";
            errBox.className = "alert alert-danger p-2 text-center";
            errBox.innerText = "Gagal menghubungi server.";
        }
        btn.disabled = false;
        btn.disabled = false;
        btn.innerHTML = `Mendaftar <i class="bi bi-person-check"></i>`;
    });

    document.getElementById('showRegister').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('login-pane').style.display = 'none';
        document.getElementById('register-pane').style.display = 'block';
        document.getElementById('errorBox').style.display = 'none';
    });
    
    document.getElementById('showLogin').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('register-pane').style.display = 'none';
        document.getElementById('login-pane').style.display = 'block';
        document.getElementById('errorBox').style.display = 'none';
    });

    // Toggle Password Visibility
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.getElementById("togglePasswordIcon");

    if (togglePassword && passwordInput && toggleIcon) {
        togglePassword.addEventListener("click", function() {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            toggleIcon.classList.toggle("bi-eye");
            toggleIcon.classList.toggle("bi-eye-slash");
        });
    }

    // Lupa Password Handler
    const forgotPasswordLink = document.getElementById("forgotPassword");
    if (forgotPasswordLink) {
        forgotPasswordLink.addEventListener("click", function(e) {
            e.preventDefault();
            alert("Silakan hubungi Master Admin untuk melakukan reset password akun Anda.");
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Versi: 1.2.0 | Hak Cipta © 2026 BRIN -->
</body>
</html>
