<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Chamber Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar">

<div class="logo">

<i class="bi bi-cpu"></i>

Smart Chamber

</div>

<div class="status">

<span class="online-dot"></span>

ONLINE

</div>

</nav>


<div class="container-fluid p-4">

<div class="row g-4">

<div class="col-md-3">
<div class="info-card">

<h6>Total Chamber</h6>

<h2 id="jumlahChamber">6</h2>

</div>
</div>

<div class="col-md-3">
<div class="info-card">

<h6>Online</h6>

<h2 id="online">6</h2>

</div>
</div>

<div class="col-md-3">
<div class="info-card">

<h6>Alarm</h6>

<h2 class="danger" id="alarm">1</h2>

</div>
</div>

<div class="col-md-3">
<div class="info-card">

<h6>Last Update</h6>

<h2 id="clock">--:--</h2>

</div>
</div>

</div>

<div class="mt-4 mb-4 d-flex justify-content-between">

<h3>Monitoring Chamber</h3>

<button class="btn btn-primary" onclick="tambahChamber()">

<i class="bi bi-plus-circle"></i>

Tambah Chamber

</button>

</div>

<div class="row" id="containerChamber">

</div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
